<script>
    $(function () {
        $('[data-toggle="tooltip"]').tooltip();

        var currentPath = window.location.pathname.replace(/\/$/, '') || '/';
        $('.NL_main_menu a').each(function () {
            var $link = $(this);
            var linkUrl = new URL($link[0].href, window.location.origin);

            // Only highlight menu entries that point to this site.
            if (linkUrl.origin !== window.location.origin) {
                return;
            }

            var linkPath = linkUrl.pathname.replace(/\/$/, '') || '/';

            if (linkPath === currentPath) {
                $link.attr('aria-current', 'page');
                $link.closest('li').addClass('active');
            }
        });

        $('.NL_footer_menu h3').each(function (index) {
            var $heading = $(this);
            var $content = $heading.next('ul');

            if (!$content.length) {
                return;
            }

            var sectionId = 'footer-section-' + index;
            $content.attr('id', sectionId);
            $heading.attr({
                role: 'button',
                tabindex: '0',
                'aria-controls': sectionId,
                'aria-expanded': 'false'
            });
        });
    });
</script>
<script>
    $('.NL_footer_menu h3').on('click keydown', function (event) {
        var isKeyboard = event.type === 'keydown';
        var isToggleKey = event.key === 'Enter' || event.key === ' ';

        if (isKeyboard && !isToggleKey) {
            return;
        }

        if (isKeyboard) {
            event.preventDefault();
        }

        var $this = $(this);
        var $icon = $this.children('.fa');
        var $content = $this.next('ul');

        if ($(window).width() <= 993 && $content.length) {
            var isOpening = $icon.hasClass('fa-chevron-down');

            if (isOpening) {
                $this.css({ border: 'none' });
                $content.css({ 'border-bottom': '1px solid #E7E7E7' });
                $icon.removeClass('fa-chevron-down').addClass('fa-chevron-up');
                $content.animate({ height: $content.prop('scrollHeight') + 'px' }, 700);
            } else {
                $content.css({ border: 'none' });
                $icon.removeClass('fa-chevron-up').addClass('fa-chevron-down');
                $content.animate({ height: '0px' }, 700);
                $this.css({ 'border-bottom': '1px solid #E7E7E7' });
            }

            $this.attr('aria-expanded', isOpening ? 'true' : 'false');
        }
    });
</script>
<script>

<!--set affiliate cookies-->
<script>
    var searchParams = new URLSearchParams(window.location.search);

    if (searchParams.get('utm_campaign') === '{{site.affiliate.campaign}}') {
        if (searchParams.has('utm_source')) {
            var expires = new Date();
            expires.setDate(expires.getDate() + parseInt('{{site.affiliate.cookie-lifetime}}', 10));

            var affiliateCookie = '{{site.affiliate.cookie-name}}' + '=' + encodeURIComponent(searchParams.get('utm_source')) + ';';
            var affiliateCookieExpires = 'expires=' + expires.toUTCString() + ';';
            var affiliateCookiePath = 'path=/;';
            var affiliateCookieDomain = 'domain=' + document.location.hostname.match(/[^.]*\.[^.]*$/)[0] + ';';

            document.cookie = affiliateCookie + affiliateCookieExpires + affiliateCookiePath + affiliateCookieDomain;
        }
    }
</script>
